# =============================================================================
# Circuit Breakers
# =============================================================================
circuit_breakers:
  # Master kill switch
  master:
    enabled: true
    triggers:
      - condition: "daily_loss > max_daily_loss"
        action: "halt_all_trading"
        cooldown_minutes: 60
      - condition: "drawdown > max_drawdown"
        action: "halt_all_trading"
        cooldown_minutes: 120
      - condition: "error_rate > 0.10"       # More than 10% error rate
        action: "halt_all_trading"
        cooldown_minutes: 5

  # Per-exchange circuit breakers
  exchange_breakers:
    enabled: true
    triggers:
      - condition: "exchange_loss > exchange_max_loss"
        action: "halt_exchange"
        cooldown_minutes: 30
      - condition: "latency > 500ms"          # High latency
        action: "reduce_position"
        cooldown_minutes: 1
      - condition: "api_errors > 5"           # API errors in last minute
        action: "pause_exchange"
        cooldown_minutes: 2
      - condition: "rate_limit_hit"
        action: "pause_exchange"
        cooldown_minutes: 1

  # Strategy circuit breakers
  strategy_breakers:
    enabled: true
    triggers:
      - condition: "strategy_loss > strategy_max_loss"
        action: "halt_strategy"
        cooldown_minutes: 15
      - condition: "consecutive_losses > 5"
        action: "reduce_size"
        reduction_pct: 50
        cooldown_minutes: 5
      - condition: "win_rate_1h < 0.30"       # Win rate below 30%
        action: "pause_strategy"
        cooldown_minutes: 10

  # Market condition breakers
  market_breakers:
    enabled: true
    triggers:
      - condition: "volatility > 0.10"        # 10% realized vol
        action: "reduce_all_positions"
        reduction_pct: 50
      - condition: "spread > 100bps"          # Wide spreads
        action: "pause_market_making"
        cooldown_minutes: 1
      - condition: "volume_drop > 0.80"       # Volume dropped 80%
        action: "reduce_position"
        reduction_pct: 25
      - condition: "price_move > 5pct_1min"   # Flash crash/pump
        action: "halt_all_trading"
        cooldown_minutes: 5

# =============================================================================
# Real-Time Risk Monitoring
# =============================================================================
monitoring:
  # Update frequencies
  update_intervals:
    position_check_ms: 100                    # Check positions every 100ms
    pnl_update_ms: 500                        # Update P&L every 500ms
    risk_check_ms: 1000                       # Full risk check every second
    exposure_check_ms: 200                    # Exposure check every 200ms
    circuit_breaker_check_ms: 100             # Circuit breaker check

  # Alert thresholds
  alerts:
    warning:
      daily_loss_pct: 1.0                     # Warn at 1% daily loss
      position_utilization: 0.6               # Warn at 60% position limit
      margin_utilization: 0.5                 # Warn at 50% margin usage
      order_reject_rate: 0.05                 # Warn at 5% reject rate

    critical:
      daily_loss_pct: 2.0                     # Critical at 2% daily loss
      position_utilization: 0.85              # Critical at 85% position limit
      margin_utilization: 0.75                # Critical at 75% margin usage
      order_reject_rate: 0.10                 # Critical at 10% reject rate

  # Metrics collection
  metrics:
    collect_latency: true
    collect_fill_rates: true
    collect_slippage: true
    collect_pnl_attribution: true
    histogram_buckets:
      latency_us: [10, 50, 100, 250, 500, 1000, 5000, 10000]
      slippage_bps: [0.1, 0.5, 1, 2, 5, 10, 25, 50]

# =============================================================================
# Position Management
# =============================================================================
position_management:
  # Auto-hedging
  hedging:
    enabled: true
    max_unhedged_delta: 50000                # Maximum unhedged delta (USD)
    hedge_threshold: 0.1                      # Hedge when delta exceeds 10%
    hedge_exchanges:
      - binance
      - bybit
      - deribit

  # Position unwinding
  unwinding:
    panic_unwind_enabled: true
    unwind_rate_pct_per_second: 10           # Maximum 10% per second
    use_twap: true
    twap_duration_seconds: 60
    max_slippage_bps: 50                     # Maximum acceptable slippage

  # Inventory management
  inventory:
    target_inventory: 0                       # Target neutral inventory
    max_inventory_age_minutes: 30             # Reduce old inventory
    inventory_decay_rate: 0.1                 # 10% per period

# =============================================================================
# Risk Attribution & Reporting
# =============================================================================
reporting:
  # Real-time dashboard
  dashboard:
    update_frequency_ms: 1000
    metrics:
      - total_pnl
      - realized_pnl
      - unrealized_pnl
      - position_delta
      - gross_exposure
      - net_exposure
      - var_95
      - sharpe_ratio_rolling

  # Risk reports
  reports:
    daily_report:
      enabled: true
      time: "00:00:00"                        # UTC midnight
      include_pnl_breakdown: true
      include_trade_analysis: true
      include_risk_metrics: true

    intraday_snapshots:
      enabled: true
      interval_minutes: 60
      include_positions: true
      include_orders: true

  # Audit logging
  audit:
    log_all_orders: true
    log_all_fills: true
    log_position_changes: true
    log_risk_breaches: true
    retention_days: 90

# =============================================================================
# VaR & Risk Metrics
# =============================================================================
var_settings:
  # Historical VaR
  historical_var:
    enabled: true
    confidence_level: 0.95
    lookback_days: 252
    update_frequency_minutes: 60

  # Parametric VaR
  parametric_var:
    enabled: true
    confidence_level: 0.99
    volatility_model: "ewma"
    ewma_lambda: 0.94

  # Expected Shortfall (CVaR)
  expected_shortfall:
    enabled: true
    confidence_level: 0.95

  # Stress testing
  stress_tests:
    enabled: true
    scenarios:
      - name: "btc_crash_20pct"
        btc_move: -0.20
        eth_move: -0.25
        correlation_shock: 0.95

      - name: "eth_outperform"
        btc_move: -0.05
        eth_move: 0.10
        correlation_shock: -0.50

      - name: "market_crash"
        btc_move: -0.30
        eth_move: -0.35
        sol_move: -0.50
        correlation_shock: 0.98

      - name: "flash_crash"
        btc_move: -0.10
        recovery_time_minutes: 5
        liquidity_shock: 0.50
