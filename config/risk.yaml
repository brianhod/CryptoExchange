    position_limit_btc: 10.0
    position_limit_eth: 100.0
    position_limit_sol: 1000.0
    cooldown_on_error_ms: 5000
    reduce_only_threshold: 0.8          # Reduce-only when at 80% limit

  bybit:
    enabled: true
    max_position: 400000
    max_daily_loss: 8000
    max_orders_per_second: 15
    max_open_orders: 80
    max_order_value: 40000
    position_limit_btc: 8.0
    position_limit_eth: 80.0
    cooldown_on_error_ms: 5000

  okx:
    enabled: true
    max_position: 400000
    max_daily_loss: 8000
    max_orders_per_second: 20
    max_open_orders: 80
    max_order_value: 40000
    position_limit_btc: 8.0
    position_limit_eth: 80.0
    cooldown_on_error_ms: 5000

  kraken:
    enabled: true
    max_position: 200000
    max_daily_loss: 4000
    max_orders_per_second: 5
    max_open_orders: 50
    max_order_value: 25000
    cooldown_on_error_ms: 10000

  coinbase:
    enabled: true
    max_position: 200000
