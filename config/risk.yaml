# =============================================================================
# Risk Management Configuration for HFT System
# =============================================================================
# This file contains comprehensive risk management settings including:
# - Global position and loss limits
# - Per-exchange risk limits
# - Circuit breaker configurations
# - Real-time risk monitoring thresholds
#
# CRITICAL: These settings protect capital. Modify with extreme caution.
# =============================================================================

# =============================================================================
# Global Risk Limits
# =============================================================================
global:
  # Overall portfolio limits
  portfolio:
    max_total_exposure: 2000000          # Maximum total notional exposure (USD)
    max_net_exposure: 500000             # Maximum net long/short exposure (USD)
    max_gross_exposure: 3000000          # Maximum gross exposure (USD)
    max_leverage: 3.0                    # Maximum portfolio leverage
    margin_utilization_limit: 0.8        # Maximum margin usage (80%)

  # Position limits
  positions:
    max_position_per_asset: 500000       # Maximum position size per asset (USD)
    max_position_per_exchange: 750000    # Maximum position per exchange (USD)
    max_concentration_single_asset: 0.25 # Maximum 25% in single asset
    max_concentration_single_exchange: 0.40 # Maximum 40% on single exchange
    max_correlated_exposure: 0.60        # Maximum 60% in correlated assets

  # Loss limits
  loss_limits:
    max_daily_loss: 25000                # Maximum daily loss (USD)
    max_daily_loss_pct: 2.5              # Maximum daily loss as % of capital
    max_weekly_loss: 75000               # Maximum weekly loss (USD)
    max_weekly_loss_pct: 7.5             # Maximum weekly loss as %
    max_monthly_loss: 150000             # Maximum monthly loss (USD)
    max_monthly_loss_pct: 15.0           # Maximum monthly loss as %
    max_drawdown: 100000                 # Maximum drawdown from peak (USD)
    max_drawdown_pct: 10.0               # Maximum drawdown as %

  # Order limits
  orders:
    max_order_size: 100000               # Maximum single order value (USD)
    max_order_size_pct: 0.10             # Maximum order as % of capital
    max_orders_per_second: 100           # Global order rate limit
    max_orders_per_minute: 3000          # Global orders per minute
    max_open_orders: 500                 # Maximum concurrent open orders
    max_order_value_per_second: 1000000  # Maximum USD value per second
    min_order_interval_us: 1000          # Minimum microseconds between orders

  # Profit taking
  profit:
    daily_profit_target: 50000           # Optional daily profit target
    stop_on_target: false                # Stop trading when target reached
    profit_lock_pct: 0.50                # Lock 50% of profits above target

