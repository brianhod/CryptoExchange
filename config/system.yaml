# =============================================================================
# System Configuration for HFT System
# =============================================================================
# This file contains system-level configuration including:
# - Trading mode settings
# - Logging configuration
# - Thread affinity and CPU pinning
# - Performance tuning parameters
# - Network settings
# - Memory management
#
# These settings should be tuned based on the specific hardware and deployment.
# =============================================================================

# =============================================================================
# Trading Mode
# =============================================================================
trading:
  # Mode: "live", "paper", "backtest", "simulation"
  mode: "paper"

  # Paper trading settings
  paper:
    enabled: true
    initial_balance: 1000000
    simulated_latency_us: 100              # Simulated network latency
    simulated_slippage_bps: 1              # Simulated slippage
    use_real_market_data: true             # Use live market data
    fill_probability: 0.95                 # Order fill probability
    partial_fill_probability: 0.10         # Partial fill probability

  # Live trading settings
  live:
    enabled: false
    require_confirmation: true             # Require manual confirmation
    max_order_value_without_confirm: 1000  # Auto-approve small orders
    maintenance_window:
      enabled: true
      start: "04:00:00"                    # UTC
      end: "04:30:00"
      action: "cancel_all_orders"

  # Backtest settings
  backtest:
    data_path: "/data/historical"
    start_date: "2024-01-01"
    end_date: "2024-12-31"
    initial_capital: 1000000
    commission_bps: 10
    slippage_model: "fixed"                # "fixed", "volume_based", "spread_based"
    slippage_bps: 2
    use_order_book: true                   # Use full order book or just OHLCV

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  # Global log level: "trace", "debug", "info", "warn", "error", "critical", "off"
  level: "info"

  # Per-component log levels
  components:
    core: "info"
    strategy: "info"
    order_manager: "info"
    risk: "warn"
    market_data: "info"
    connectivity: "info"
    execution: "debug"

  # Console output
  console:
    enabled: true
    level: "info"
    pattern: "[%Y-%m-%d %H:%M:%S.%f] [%l] [%n] %v"
    colors: true

  # File output
  file:
    enabled: true
    path: "/var/log/hft"
    filename_pattern: "hft_%Y%m%d.log"
    level: "debug"
    max_file_size_mb: 100
    max_files: 30
    rotate_on_startup: true

  # Async logging (recommended for HFT)
  async:
    enabled: true
    queue_size: 8192
    flush_interval_ms: 100
    overflow_policy: "discard_oldest"      # "block", "discard_oldest", "discard_newest"

  # Structured logging (JSON)
  structured:
    enabled: true
    path: "/var/log/hft/structured"
    filename_pattern: "hft_json_%Y%m%d.log"

  # Trade logging (separate audit trail)
  trades:
    enabled: true
    path: "/var/log/hft/trades"
    filename_pattern: "trades_%Y%m%d.log"
    include_order_book_snapshot: false

  # Performance logging
  performance:
    enabled: true
    path: "/var/log/hft/perf"
    log_latency_histograms: true
    histogram_interval_seconds: 60

# =============================================================================
# Thread Affinity & CPU Pinning
# =============================================================================
threading:
  # Enable CPU pinning
  cpu_affinity:
    enabled: true

  # Core allocation
  # Assuming 16-core system with hyperthreading (32 logical cores)
  # Cores 0-7: System and non-critical tasks
  # Cores 8-15: Trading critical path
  # Cores 16-31: Hyperthreads (avoid for latency-critical)

  threads:
    # Market data processing (highest priority)
    market_data:
      count: 4
      cores: [8, 9, 10, 11]
      priority: "realtime"                 # "normal", "high", "realtime"
      nice: -20

    # Order execution (highest priority)
    order_execution:
      count: 2
      cores: [12, 13]
      priority: "realtime"
      nice: -20

    # Strategy threads
    strategy:
      count: 4
      cores: [14, 15, 16, 17]
      priority: "high"
      nice: -10

    # Risk management
    risk:
      count: 2
      cores: [18, 19]
      priority: "high"
      nice: -10

    # Network I/O
    network:
      count: 4
      cores: [20, 21, 22, 23]
      priority: "high"
      nice: -5

    # Logging (low priority)
    logging:
      count: 1
      cores: [24]
      priority: "normal"
      nice: 0

    # Monitoring & metrics
    monitoring:
      count: 1
      cores: [25]
      priority: "normal"
      nice: 0

    # Background tasks
    background:
      count: 2
      cores: [26, 27]
      priority: "normal"
      nice: 10

  # Thread pool settings
  thread_pool:
    io_threads: 8
    compute_threads: 4
    enable_work_stealing: true

# =============================================================================
# Performance Tuning
# =============================================================================
performance:
  # Memory settings
  memory:
    preallocate_heap_mb: 4096              # Pre-allocate heap memory
    use_huge_pages: true                   # Use 2MB huge pages
    huge_page_count: 512                   # Number of huge pages
    lock_memory: true                      # Prevent swapping (mlockall)
    numa_aware: true                       # NUMA-aware allocation
    preferred_numa_node: 0

  # Memory pools
  pools:
    order_pool_size: 100000                # Pre-allocated order objects
    message_pool_size: 500000              # Pre-allocated messages
    string_pool_size_mb: 64                # String pool size

  # CPU optimizations
  cpu:
    disable_turbo_boost: false             # More consistent latency if disabled
    disable_c_states: true                 # Disable CPU sleep states
    disable_hyperthreading_cores: true     # Don't use HT cores for critical paths
    isolate_cores: true                    # Use isolcpus kernel parameter
    isolated_cores: "8-19"                 # Cores isolated from scheduler

  # Network optimizations
  network:
    busy_polling: true                     # Busy poll sockets
    busy_poll_us: 50                       # Busy poll duration
    tcp_nodelay: true                      # Disable Nagle's algorithm
    tcp_quickack: true                     # Quick ACK mode
    so_rcvbuf: 8388608                     # 8MB receive buffer
    so_sndbuf: 8388608                     # 8MB send buffer
    socket_priority: 6                     # SO_PRIORITY
    use_io_uring: true                     # Use io_uring if available

  # Kernel bypass (requires special setup)
  kernel_bypass:
    enabled: false                         # Enable DPDK/kernel bypass
    dpdk_enabled: false
    dpdk_cores: [28, 29, 30, 31]
    dpdk_memory_mb: 2048

  # Latency optimizations
  latency:
    spin_wait_enabled: true                # Spin instead of sleep
    spin_wait_us: 10                       # Max spin duration
    busy_loop_detection: true              # Detect and avoid busy loops
    timestamp_source: "tsc"                # "tsc", "hpet", "system"

  # JIT compilation (if using scripting)
  jit:
    enabled: false
    optimization_level: 3
    cache_compiled: true

# =============================================================================
# Network Configuration
# =============================================================================
network:
  # Connection settings
  connections:
    connect_timeout_ms: 5000
    read_timeout_ms: 30000
    write_timeout_ms: 5000
    keep_alive: true
    keep_alive_interval_s: 30

  # WebSocket settings
  websocket:
    max_message_size: 16777216             # 16MB
    compression: true
    compression_level: 1                   # Fast compression
    ping_interval_ms: 30000
    pong_timeout_ms: 10000
    reconnect_enabled: true
    reconnect_delay_base_ms: 100
    reconnect_delay_max_ms: 30000
    reconnect_delay_multiplier: 2.0

  # HTTP/REST settings
  http:
    max_connections_per_host: 10
    connection_pool_size: 50
    use_http2: true
    http2_max_streams: 100

  # DNS settings
  dns:
    cache_enabled: true
    cache_ttl_seconds: 300
    prefer_ipv4: true
    use_system_resolver: false
    custom_servers:
      - "8.8.8.8"
      - "1.1.1.1"

  # Proxy settings (if needed)
  proxy:
    enabled: false
    http_proxy: ""
    https_proxy: ""
    no_proxy: "localhost,127.0.0.1"

# =============================================================================
# Data Management
# =============================================================================
data:
  # Market data storage
  market_data:
    store_locally: true
    storage_path: "/data/market_data"
    compression: "lz4"                     # "none", "lz4", "zstd"
    retention_days: 90

  # Order book management
  order_book:
    max_depth: 100                         # Maximum order book depth
    update_mode: "incremental"             # "snapshot", "incremental"
    snapshot_interval_ms: 1000

  # Trade history
  trades:
    store_locally: true
    storage_path: "/data/trades"
    retention_days: 365

  # State persistence
  persistence:
    enabled: true
    path: "/data/state"
    checkpoint_interval_seconds: 60
    use_rocksdb: true

# =============================================================================
# Monitoring & Metrics
# =============================================================================
monitoring:
  # Prometheus metrics
  prometheus:
    enabled: true
    port: 9090
    path: "/metrics"
    include_histograms: true

  # Health checks
  health:
    enabled: true
    port: 8080
    path: "/health"
    check_interval_ms: 1000

  # Alerting
  alerting:
    enabled: true
    channels:
      slack:
        enabled: true
        webhook_url: "${SLACK_WEBHOOK_URL}"
        channel: "#hft-alerts"
      email:
        enabled: false
        smtp_server: "smtp.example.com"
        recipients:
          - "alerts@example.com"
      pagerduty:
        enabled: false
        service_key: "${PAGERDUTY_KEY}"

  # Dashboards
  grafana:
    enabled: true
    datasource: "prometheus"

# =============================================================================
# Security
# =============================================================================
security:
  # Encryption
  encryption:
    key_derivation: "pbkdf2"
    iterations: 100000
    key_length: 256

  # API security
  api:
    rate_limiting: true
    max_requests_per_minute: 1000
    require_authentication: true

  # Secrets management
  secrets:
    provider: "environment"                # "environment", "vault", "aws_secrets"
    vault_address: ""
    vault_token: ""

  # Audit
  audit:
    enabled: true
    log_api_calls: true
    log_config_changes: true
    log_authentication: true

# =============================================================================
# Feature Flags
# =============================================================================
features:
  # Trading features
  trading:
    enable_short_selling: true
    enable_margin_trading: true
    enable_futures: true
    enable_options: false

  # Strategy features
  strategies:
    enable_ml_strategies: false
    enable_adaptive_parameters: true
    enable_multi_timeframe: true

  # Risk features
  risk:
    enable_real_time_var: true
    enable_stress_testing: true
    enable_scenario_analysis: true

  # Experimental features
  experimental:
    enable_quantum_rng: false
    enable_ml_execution: false
    enable_sentiment_analysis: false

# =============================================================================
# Environment-Specific Overrides
# =============================================================================
environments:
  development:
    trading:
      mode: "paper"
    logging:
      level: "debug"
    performance:
      memory:
        preallocate_heap_mb: 1024

  staging:
    trading:
      mode: "paper"
    logging:
      level: "info"

  production:
    trading:
      mode: "live"
    logging:
      level: "warn"
    performance:
      memory:
        preallocate_heap_mb: 8192
        lock_memory: true

# Current environment
environment: "development"
