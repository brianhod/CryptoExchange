# =============================================================================
# Exchange Configuration for HFT System
# =============================================================================
# This file contains configuration for all supported cryptocurrency exchanges.
#
# IMPORTANT:
# - API keys should be encrypted in production. Set encrypted: true and use
#   the encryption key from environment variable HFT_ENCRYPTION_KEY
# - Testnet credentials are recommended for development and testing
# - Rate limits are exchange-enforced; exceeding them will result in bans
# =============================================================================

exchanges:
  # ===========================================================================
  # BINANCE
  # ===========================================================================
  binance:
    enabled: true
    testnet: false

    # API Credentials (use environment variables or encryption in production)
    api_key: "${BINANCE_API_KEY}"
    api_secret: "${BINANCE_API_SECRET}"
    encrypted: false

    # Testnet credentials
    testnet_credentials:
      api_key: "${BINANCE_TESTNET_API_KEY}"
      api_secret: "${BINANCE_TESTNET_API_SECRET}"
      encrypted: false

    # Rate limits (Binance enforced)
    rate_limits:
      requests_per_second: 10
      requests_per_minute: 1200
      orders_per_second: 10
      orders_per_minute: 100000
      weight_per_minute: 1200
      connection_limit: 5
      burst_requests: 20
      burst_window_ms: 100

    # Endpoints
    endpoints:
      rest:
        base_url: "https://api.binance.com"
        timeout_ms: 5000
        connect_timeout_ms: 3000
        keep_alive: true
        max_connections: 10
        use_http2: true

      ws_public:
        url: "wss://stream.binance.com:9443/ws"
        ping_interval_ms: 180000
        pong_timeout_ms: 10000
        reconnect_delay_ms: 1000
        max_reconnect_attempts: 10
        compression_enabled: true
        max_message_size: 1048576

      ws_private:
        url: "wss://stream.binance.com:9443/ws"
        ping_interval_ms: 180000
        pong_timeout_ms: 10000
        reconnect_delay_ms: 1000
        max_reconnect_attempts: 10

      testnet_rest:
        base_url: "https://testnet.binance.vision"
        timeout_ms: 5000

      testnet_ws_public:
        url: "wss://testnet.binance.vision/ws"

      testnet_ws_private:
        url: "wss://testnet.binance.vision/ws"

    # Timing settings
    recv_window_enabled: true
    recv_window_ms: 5000

    # Trading pairs
    trading_pairs:
      - symbol: "BTCUSDT"
        base_asset: "BTC"
        quote_asset: "USDT"
        price_precision: 2
        quantity_precision: 5
        min_quantity: 0.00001
        max_quantity: 9000
        min_notional: 10
        step_size: 0.00001
        tick_size: 0.01
        maker_fee_bps: 10
        taker_fee_bps: 10
        enabled: true

      - symbol: "ETHUSDT"
        base_asset: "ETH"
        quote_asset: "USDT"
        price_precision: 2
        quantity_precision: 4
        min_quantity: 0.0001
        max_quantity: 9000
        min_notional: 10
        step_size: 0.0001
        tick_size: 0.01
        maker_fee_bps: 10
        taker_fee_bps: 10
        enabled: true

      - symbol: "SOLUSDT"
        base_asset: "SOL"
        quote_asset: "USDT"
        price_precision: 2
        quantity_precision: 2
        min_quantity: 0.01
        max_quantity: 100000
        min_notional: 10
        step_size: 0.01
        tick_size: 0.01
        maker_fee_bps: 10
        taker_fee_bps: 10
        enabled: true

