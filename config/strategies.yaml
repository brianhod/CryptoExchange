# =============================================================================
# Strategy Configuration for HFT System
# =============================================================================
# This file contains configuration for all trading strategies.
#
# Strategy Types:
#   HFT Strategies (5):
#     - latency_arbitrage: Cross-exchange price discrepancy exploitation
#     - triangular_arbitrage: Three-leg arbitrage within single exchange
#     - statistical_arbitrage: Mean-reversion pair trading
#     - order_flow_imbalance: Trade flow momentum signals
#     - microstructure_alpha: Market microstructure signals
#
#   Market Making Strategies (5):
#     - basic_market_making: Simple two-sided quoting
#     - adaptive_market_making: Dynamic spread adjustment
#     - inventory_market_making: Avellaneda-Stoikov framework
#     - multi_exchange_market_making: Cross-exchange market making
#     - volatility_market_making: Volatility-adjusted spreads
# =============================================================================

strategies:
  # ===========================================================================
  # HFT STRATEGIES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Latency Arbitrage Strategy
  # Exploits price discrepancies across exchanges due to latency differences
  # ---------------------------------------------------------------------------
  latency_arb_btc:
    type: "latency_arbitrage"
    enabled: true
    priority: 100

    capital_allocation: 100000
    capital_allocation_pct: 10

    tick_interval_us: 100
    signal_timeout_ms: 50

    risk_limits:
      max_position_size: 1.0
      max_position_value: 50000
      max_order_size: 0.5
      max_order_value: 25000
      max_daily_loss: 1000
      max_drawdown: 2000
      max_trades_per_minute: 60
      max_open_orders: 10

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
        enabled: true
      - symbol: "BTC/USDT"
        exchange: "bybit"
        enabled: true
      - symbol: "BTC-USDT"
        exchange: "okx"
        enabled: true
      - symbol: "BTC-USDT"
        exchange: "kucoin"
        enabled: true

    params:
      min_profit_bps: 2.0
      max_latency_ms: 10
      stale_price_threshold_ms: 50
      use_maker_orders: false
      aggression_factor: 0.8
      confidence_threshold: 0.75
      fast_exchanges:
        - "binance"
        - "bybit"
      slow_exchanges:
        - "okx"
        - "kucoin"

  # ---------------------------------------------------------------------------
  # Triangular Arbitrage Strategy
  # Exploits pricing inefficiencies in three-leg currency triangles
  # ---------------------------------------------------------------------------
  triangular_arb_binance:
    type: "triangular_arbitrage"
    enabled: true
    priority: 95

    capital_allocation: 50000
    capital_allocation_pct: 5

    tick_interval_us: 500
    signal_timeout_ms: 100

    risk_limits:
      max_position_size: 100000
      max_position_value: 50000
      max_order_size: 25000
      max_daily_loss: 500
      max_drawdown: 1000
      max_trades_per_minute: 30

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
      - symbol: "ETH/USDT"
        exchange: "binance"
      - symbol: "ETH/BTC"
        exchange: "binance"

    params:
      min_profit_bps: 3.0
      max_leg_slippage_bps: 2.0
      max_execution_time_ms: 100
      partial_fills_allowed: false
      volume_threshold: 5000
      triangles:
        - ["BTCUSDT", "ETHBTC", "ETHUSDT"]
        - ["BTCUSDT", "SOLBTC", "SOLUSDT"]
        - ["ETHUSDT", "SOLETH", "SOLUSDT"]

  # ---------------------------------------------------------------------------
  # Statistical Arbitrage Strategy
  # Mean-reversion trading on cointegrated asset pairs
  # ---------------------------------------------------------------------------
  stat_arb_crypto:
    type: "statistical_arbitrage"
    enabled: true
    priority: 80

    capital_allocation: 200000
    capital_allocation_pct: 20

    tick_interval_us: 10000
    signal_timeout_ms: 1000

    risk_limits:
      max_position_size: 5.0
      max_position_value: 100000
      max_order_size: 1.0
      max_order_value: 50000
      max_daily_loss: 5000
      max_drawdown: 10000
      max_trades_per_minute: 10

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
      - symbol: "ETH/USDT"
        exchange: "binance"

    params:
      entry_z_score: 2.0
      exit_z_score: 0.5
      stop_loss_z_score: 4.0
      lookback_period: 100
      half_life: 20
      correlation_threshold: 0.7
      cointegration_pvalue: 0.05
      dynamic_hedge_ratio: true
      rebalance_interval_ms: 60000
      pairs:
        - ["BTC/USDT", "ETH/USDT"]

  # ---------------------------------------------------------------------------
  # Order Flow Imbalance Strategy
  # Trades based on order book and trade flow imbalances
  # ---------------------------------------------------------------------------
  order_flow_btc:
    type: "order_flow_imbalance"
    enabled: true
    priority: 90

    capital_allocation: 75000
    capital_allocation_pct: 7.5

    tick_interval_us: 500
    signal_timeout_ms: 100

    risk_limits:
      max_position_size: 0.5
      max_position_value: 25000
      max_order_size: 0.2
      max_order_value: 10000
      max_daily_loss: 1500
      max_drawdown: 3000
      max_trades_per_minute: 30

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
        enabled: true

    params:
      imbalance_threshold: 0.6
      depth_levels: 10
      flow_window_ms: 1000
      volume_threshold: 50000
      momentum_factor: 0.5
      use_trade_imbalance: true
      use_cancel_imbalance: true
      aggression_decay: 0.95

  # ---------------------------------------------------------------------------
  # Microstructure Alpha Strategy
  # Generates alpha from market microstructure signals
  # ---------------------------------------------------------------------------
  microstructure_eth:
    type: "microstructure_alpha"
    enabled: true
    priority: 85

    capital_allocation: 50000
    capital_allocation_pct: 5

    tick_interval_us: 250
    signal_timeout_ms: 50

    risk_limits:
      max_position_size: 5.0
      max_position_value: 15000
      max_order_size: 2.0
      max_order_value: 6000
      max_daily_loss: 1000
      max_drawdown: 2000
      max_trades_per_minute: 60

    trading_pairs:
      - symbol: "ETH/USDT"
        exchange: "binance"

    params:
      tick_intensity_threshold: 0.7
      spread_percentile: 0.25
      book_pressure_depth: 5
      queue_position_alpha: 0.3
      use_tick_rule: true
      microprice_weight: 0.5
      signal_decay_ticks: 10

  # ===========================================================================
  # MARKET MAKING STRATEGIES
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Basic Market Making Strategy
  # Simple two-sided quoting with fixed spreads
  # ---------------------------------------------------------------------------
  basic_mm_btc:
    type: "basic_market_making"
    enabled: true
    priority: 70

    capital_allocation: 100000
    capital_allocation_pct: 10

    tick_interval_us: 1000
    signal_timeout_ms: 500

    risk_limits:
      max_position_size: 2.0
      max_position_value: 100000
      max_order_size: 0.5
      max_order_value: 25000
      max_daily_loss: 2000
      max_drawdown: 5000
      max_open_orders: 20
      max_trades_per_minute: 30

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"

    params:
      spread_bps: 10
      skew_factor: 0.5
      num_levels: 3
      level_spacing_bps: 2
      quote_size: 0.1
      min_spread_bps: 5
      max_spread_bps: 30
      fade_inventory: true
      inventory_skew_factor: 0.1
      quote_refresh_ms: 100

  # ---------------------------------------------------------------------------
  # Adaptive Market Making Strategy
  # Dynamically adjusts spreads based on market conditions
  # ---------------------------------------------------------------------------
  adaptive_mm_eth:
    type: "adaptive_market_making"
    enabled: true
    priority: 75

    capital_allocation: 150000
    capital_allocation_pct: 15

    tick_interval_us: 1000
    signal_timeout_ms: 500

    risk_limits:
      max_position_size: 10.0
      max_position_value: 30000
      max_order_size: 3.0
      max_order_value: 9000
      max_daily_loss: 3000
      max_drawdown: 6000
      max_open_orders: 30

    trading_pairs:
      - symbol: "ETH/USDT"
        exchange: "binance"
      - symbol: "ETH-USDT"
        exchange: "okx"

    params:
      base_spread_bps: 8
      volatility_scaling: 1.0
      inventory_aversion: 0.5
      adverse_selection_factor: 0.3
      regime_lookback: 100
      use_fair_value_model: true
      learning_rate: 0.01
      volatility_model: "ewma"
      vol_ewma_span: 100

  # ---------------------------------------------------------------------------
  # Inventory Market Making Strategy
  # Uses Avellaneda-Stoikov framework for optimal quoting
  # ---------------------------------------------------------------------------
  inventory_mm_sol:
    type: "inventory_market_making"
    enabled: true
    priority: 72

    capital_allocation: 80000
    capital_allocation_pct: 8

    tick_interval_us: 2000
    signal_timeout_ms: 1000

    risk_limits:
      max_position_size: 500
      max_position_value: 40000
      max_order_size: 100
      max_order_value: 8000
      max_daily_loss: 2000
      max_drawdown: 4000
      max_open_orders: 20

    trading_pairs:
      - symbol: "SOL/USDT"
        exchange: "binance"
      - symbol: "SOLUSDT"
        exchange: "bybit"

    params:
      target_inventory: 0
      inventory_half_life: 300
      risk_aversion: 0.5
      max_inventory: 200
      skew_intensity: 1.0
      use_avellaneda_stoikov: true
      terminal_time: 3600
      gamma: 0.1

  # ---------------------------------------------------------------------------
  # Multi-Exchange Market Making Strategy
  # Market making across multiple exchanges with hedging
  # ---------------------------------------------------------------------------
  multi_exchange_mm_btc:
    type: "multi_exchange_market_making"
    enabled: true
    priority: 85

    capital_allocation: 250000
    capital_allocation_pct: 25

    tick_interval_us: 500
    signal_timeout_ms: 200

    risk_limits:
      max_position_size: 3.0
      max_position_value: 150000
      max_order_size: 0.5
      max_order_value: 25000
      max_daily_loss: 5000
      max_drawdown: 10000
      max_open_orders: 50
      max_notional_exposure: 500000

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
        allocation_weight: 0.4
      - symbol: "BTCUSDT"
        exchange: "bybit"
        allocation_weight: 0.3
      - symbol: "BTC-USDT"
        exchange: "okx"
        allocation_weight: 0.3

    params:
      exchanges:
        - "binance"
        - "bybit"
        - "okx"
      min_cross_exchange_spread: 5
      latency_penalty_factor: 0.1
      enable_hedging: true
      hedge_ratio: 1.0
      max_hedge_delay_ms: 50
      concentration_limit: 0.5

  # ---------------------------------------------------------------------------
  # Volatility Market Making Strategy
  # Adjusts spreads based on realized and implied volatility
  # ---------------------------------------------------------------------------
  volatility_mm_multi:
    type: "volatility_market_making"
    enabled: true
    priority: 78

    capital_allocation: 120000
    capital_allocation_pct: 12

    tick_interval_us: 5000
    signal_timeout_ms: 1000

    risk_limits:
      max_position_size: 2.0
      max_position_value: 60000
      max_order_size: 0.5
      max_order_value: 25000
      max_daily_loss: 3000
      max_drawdown: 6000
      max_open_orders: 30
      max_delta_exposure: 50000

    trading_pairs:
      - symbol: "BTC/USDT"
        exchange: "binance"
      - symbol: "ETH/USDT"
        exchange: "binance"

    params:
      vol_regime_threshold: 0.02
      spread_vol_multiplier: 5.0
      gamma_scalping_threshold: 0.01
      adjust_for_skew: true
      delta_hedge_threshold: 0.1
      vol_update_interval_ms: 1000
      implied_vol_model: "sabr"

# =============================================================================
# Global Strategy Settings
# =============================================================================
global:
  # Default risk parameters for all strategies
  default_risk:
    max_position_pct: 0.1
    max_concentration: 0.3
    cooldown_after_loss_ms: 5000

  # Strategy execution priority order
  execution_order:
    - latency_arb_btc
    - order_flow_btc
    - microstructure_eth
    - multi_exchange_mm_btc
    - triangular_arb_binance
    - adaptive_mm_eth
    - volatility_mm_multi
    - stat_arb_crypto
    - inventory_mm_sol
    - basic_mm_btc

  # Capital allocation validation
  total_capital: 1000000
  max_total_allocation_pct: 100
